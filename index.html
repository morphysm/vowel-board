<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#080808">
    <title>The Vowel Board</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Unbounded:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --fg: #c8c8c8;
            --dim: #383838;
            --void: #000000;
            --vowel-color: #c8c8c8;
            --speed: 0.5s;
            --noise-opacity: 0.025;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: 'IBM Plex Mono', monospace;
            overflow: hidden;
            cursor: crosshair;
        }

        /* NOISE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: var(--noise-opacity);
            pointer-events: none;
            z-index: 999;
            mix-blend-mode: overlay;
        }

        /* SCANLINES */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.07) 2px,
                rgba(0,0,0,0.07) 4px
            );
            pointer-events: none;
            z-index: 998;
        }

        /* COLOR WASH — the Rimbaud engine */
        #color-wash {
            position: fixed;
            inset: 0;
            background: var(--vowel-color);
            opacity: 0;
            mix-blend-mode: color;
            pointer-events: none;
            transition: opacity 1.5s ease;
            z-index: 1;
        }

        /* LAYOUT */
        #stage {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* SPIDER */
        #spider-wrap {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 3rem;
        }

        #spider-svg {
            width: 100%;
            height: 100%;
        }

        /* TITLE */
        #title {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(0.6rem, 1.8vw, 0.9rem);
            letter-spacing: 0.55em;
            text-transform: uppercase;
            color: #484848;
            margin-bottom: 0.4rem;
        }

        #subtitle {
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: #cc2200;
            margin-bottom: 2.8rem;
            text-transform: uppercase;
        }

        /* VOWEL GRID */
        #vowel-grid {
            display: flex;
            gap: 0;
            margin-bottom: 2.5rem;
        }

        .v-btn {
            position: relative;
            background: none;
            border: none;
            border-left: 1px solid #2a2a2a;
            color: #686868;
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(1.6rem, 4.5vw, 2.4rem);
            padding: 0.55em 1.1em;
            cursor: crosshair;
            transition: color 0.12s ease;
            letter-spacing: 0.05em;
        }

        .v-btn:last-child { border-right: 1px solid #2a2a2a; }

        .v-btn::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0;
            width: 0%;
            height: 1px;
            background: var(--vowel-color);
            transition: width 0.25s ease;
        }

        .v-btn:hover { color: #d8d8d8; }
        .v-btn:hover::after { width: 100%; }

        .v-btn.active {
            color: var(--vowel-color);
        }
        .v-btn.active::after {
            width: 100%;
            background: var(--vowel-color);
            box-shadow: 0 0 8px var(--vowel-color);
        }

        /* NOTE STRIP */
        #note-strip {
            height: 1.6em;
            font-size: 0.68rem;
            font-style: italic;
            color: #2a2a2a;
            letter-spacing: 0.09em;
            transition: color 0.25s ease;
            text-align: center;
            margin-bottom: 1.4rem;
            max-width: 500px;
            padding: 0 1rem;
        }

        /* PHASES */
        .phase { display: none; width: 100%; text-align: center; }
        .phase.visible { display: block; }

        /* MORNING */
        #morning-hint {
            font-size: 0.58rem;
            color: #282828;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            margin-top: 1rem;
            transition: color 0.4s ease;
        }
        #morning-hint.ready {
            color: #484848;
        }

        /* EVENING */
        #evening-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #2a2a2a;
            margin-bottom: 1.5rem;
        }

        #color-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #1e1e1e;
            color: var(--fg);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            padding: 0.5em 0;
            width: 220px;
            transition: border-color 0.4s ease, color 0.4s ease;
            letter-spacing: 0.15em;
        }

        #color-input::placeholder { color: #222; }
        #color-input:focus { border-color: #444; }

        #color-preview-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: transparent;
            margin-left: 8px;
            vertical-align: middle;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        /* ── MIDNIGHT MASS ─────────────────────────────────── */
        #midnight-inner {
            max-width: 420px;
            margin: 0 auto;
            text-align: center;
        }

        /* FLICKER — phase number strobing 0–11, chaotic red spectrum */
        #mm-flicker {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(5rem, 18vw, 10rem);
            line-height: 1;
            min-height: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -0.02em;
            /* color set dynamically by JS per frame */
        }

        /* Strobe flash overlay — full screen white pulse on each number change */
        #mm-strobe {
            position: fixed;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 500;
        }

        @keyframes strobe-pulse {
            0%   { opacity: 0.12; }
            100% { opacity: 0; }
        }

        /* PHASE CARD */
        #mm-card {
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        #mm-card.visible { opacity: 1; }

        /* Rimbaud vowel — large, colored, glowing */
        #mm-vowel-glyph {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(3.5rem, 12vw, 7rem);
            line-height: 1;
            color: var(--vowel-color);
            text-shadow: 0 0 50px var(--vowel-color), 0 0 100px var(--vowel-color);
            margin-bottom: 2rem;
            opacity: 0;
            transform: scale(0.85);
            transition: opacity 1.8s ease, transform 1.8s ease;
        }
        #mm-vowel-glyph.on { opacity: 1; transform: scale(1); }

        /* Demon node number — small, barely visible */
        #mm-demon-node {
            font-size: 0.55rem;
            letter-spacing: 0.4em;
            color: #cc2200;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            opacity: 0;
            transition: opacity 1s ease;
        }
        #mm-demon-node.on { opacity: 1; }

        /* Demon name — the centrepiece */
        #mm-demon-name {
            font-family: 'Unbounded', sans-serif;
            font-weight: 300;
            font-size: clamp(1.1rem, 3.5vw, 1.8rem);
            letter-spacing: 0.15em;
            color: var(--fg);
            text-transform: uppercase;
            margin-bottom: 0.6rem;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 1.2s ease, transform 1.2s ease;
        }
        #mm-demon-name.on { opacity: 1; transform: translateY(0); }

        /* Canonical demon description — from Lemegeton */
        #mm-role {
            font-size: 0.58rem;
            font-style: italic;
            letter-spacing: 0.06em;
            line-height: 1.7;
            color: #cc2200;
            max-width: 360px;
            margin: 0 auto 1.5rem;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        #mm-role.on { opacity: 1; }

        /* Divider */
        .mm-divider {
            width: 1px;
            height: 28px;
            background: #1a1a1a;
            margin: 0 auto 1.5rem;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        .mm-divider.on { opacity: 1; }

        /* Cycle label */
        #mm-cycle-label {
            font-size: 0.58rem;
            letter-spacing: 0.3em;
            color: #2e2e2e;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            opacity: 0;
            transition: opacity 1s ease;
        }
        #mm-cycle-label.on { opacity: 1; }

        /* Vowel signature */
        #mm-sig {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 0.25em;
            color: var(--vowel-color);
            opacity: 0;
            transition: opacity 1s ease;
            margin-bottom: 1.5rem;
        }
        #mm-sig.on { opacity: 0.6; }

        /* Color name */
        #mm-color-name {
            font-style: italic;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--vowel-color);
            opacity: 0;
            transition: opacity 1s ease;
        }
        #mm-color-name.on { opacity: 0.5; }

        /* CLOCK */
        #clock {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #1a1a1a;
            z-index: 20;
        }

        /* PHASE LINE */
        .ritual-line {
            width: 1px;
            height: 40px;
            background: #1a1a1a;
            margin: 0 auto 2.5rem;
        }

        /* GLITCH on actual midnight hour */
        @keyframes glitch-shift {
            0%   { clip-path: inset(10% 0 80% 0); transform: translate(-3px, 0); }
            25%  { clip-path: inset(60% 0 20% 0); transform: translate(3px, 0); }
            50%  { clip-path: inset(30% 0 50% 0); transform: translate(-2px, 0); }
            75%  { clip-path: inset(80% 0 5% 0);  transform: translate(2px, 0); }
            100% { clip-path: inset(40% 0 40% 0); transform: translate(0, 0); }
        }

        .glitch-active #mm-demon-name::before,
        .glitch-active #mm-demon-name::after {
            content: attr(data-name);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            font-family: inherit; font-size: inherit;
            font-weight: inherit;
        }
        #mm-demon-name { position: relative; display: inline-block; }
        .glitch-active #mm-demon-name::before {
            color: #ff0044;
            animation: glitch-shift 0.15s infinite;
            left: 2px;
        }
        .glitch-active #mm-demon-name::after {
            color: #00ffcc;
            animation: glitch-shift 0.15s infinite reverse;
            left: -2px;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .rise { animation: rise 0.7s ease forwards; }


        /* ── WAITING STATE ─────────────────────────────────── */

        /* Spider transition states */
        #spider-wrap {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 2rem;
            transition: opacity 1.2s ease, transform 1.2s ease;
        }
        #spider-wrap.vanished {
            opacity: 0;
            transform: scale(0.6);
            pointer-events: none;
        }
        /* Scarlet spider after demon reveal */
        #spider-wrap.scarlet .eye-orb { stroke: #cc0000 !important; }
        #spider-wrap.scarlet ellipse  { stroke: #cc0000 !important; }
        #spider-wrap.scarlet g[stroke] { stroke: #cc0000 !important; }
        #spider-wrap.scarlet .pupil   { fill: #ff0033 !important; }


        /* Counter replaces spider during wait */
        #waiting-counter {
            position: absolute;
            top: 0; left: 0;
            width: 160px;
            height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 1.2s ease, transform 1.2s ease;
            pointer-events: none;
        }
        #waiting-counter.visible {
            opacity: 1;
            transform: scale(1);
        }
        #counter-time {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: #2a2a2a;
            line-height: 1;
            transition: color 1s ease, text-shadow 1s ease;
        }
        #counter-label {
            font-size: 0.38rem;
            letter-spacing: 0.3em;
            color: #1a1a1a;
            text-transform: uppercase;
            margin-top: 0.5rem;
            transition: color 1s ease;
        }

        /* Growing ritual line — rises from bottom as midnight approaches */
        #ritual-tension {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 0px;
            background: #1a1a1a;
            z-index: 15;
            pointer-events: none;
            transition: background 3s ease, box-shadow 3s ease;
        }
        #ritual-tension.near     { background: #2a2a2a; }
        #ritual-tension.imminent { background: #550000; box-shadow: 0 0 8px #330000; }

        /* Clock intensity tiers */
        #clock.near     { color: #2a2a2a !important; }
        #clock.imminent { color: #553333 !important; text-shadow: 0 0 12px #330000; }
        #clock.midnight { color: #880000 !important; text-shadow: 0 0 20px #440000; }

        /* Mobile waiting state */
        @media (max-width: 768px) {
            #spider-wrap {
                width: 110px !important;
                height: 110px !important;
            }
            #waiting-counter {
                width: 110px !important;
                height: 110px !important;
            }
            #counter-time { font-size: 0.85rem !important; }
        }
        /* ── MOBILE — single breakpoint, same approach as Sigil.Forge ── */
        @media (max-width: 768px) {

            html, body {
                cursor: auto;
                overscroll-behavior: none;
                -webkit-tap-highlight-color: transparent;
            }

            #stage {
                min-height: 100vh;
                height: auto;
                padding: 2rem 1rem;
                justify-content: center;
                overflow-x: hidden;
            }

            /* Spider smaller */
            #spider-wrap {
                width: 110px !important;
                height: 110px !important;
                margin-bottom: 1.5rem !important;
            }

            /* Title stack */
            #title {
                font-size: 0.55rem !important;
                letter-spacing: 0.3em !important;
            }
            #subtitle {
                font-size: 0.48rem !important;
                letter-spacing: 0.18em !important;
                margin-bottom: 1.8rem !important;
            }

            /* Ritual line */
            .ritual-line {
                height: 24px !important;
                margin-bottom: 1.4rem !important;
            }

            /* Vowel buttons — bigger tap targets */
            #vowel-grid { margin-bottom: 1.4rem !important; }
            .v-btn {
                font-size: 1.5rem !important;
                padding: 0.6em 0.8em !important;
                cursor: auto !important;
                min-width: 44px;
                min-height: 44px;
            }

            /* Note strip wraps */
            #note-strip {
                height: auto !important;
                min-height: 1.6em !important;
                font-size: 0.58rem !important;
                white-space: normal !important;
                line-height: 1.5 !important;
                padding: 0 0.8rem !important;
                margin-bottom: 1rem !important;
            }

            /* Morning hints */
            #morning-hint {
                font-size: 0.5rem !important;
                letter-spacing: 0.2em !important;
            }

            /* Seal button — always visible on mobile, big tap target */
            #morning-confirm {
                display: inline-block !important;
                margin-top: 1.2rem !important;
                font-size: 0.52rem !important;
                letter-spacing: 0.3em !important;
                text-transform: uppercase !important;
                color: #2a2a2a !important;
                padding: 0.9em 2.2em !important;
                border: 1px solid #1e1e1e !important;
                cursor: pointer !important;
                min-height: 44px !important;
            }
            #morning-confirm.ready {
                color: #555 !important;
                border-color: #333 !important;
            }

            /* Evening phase */
            #evening-label {
                font-size: 0.58rem !important;
                letter-spacing: 0.12em !important;
                margin-bottom: 1.2rem !important;
                padding: 0 1rem !important;
            }
            #color-input {
                width: 200px !important;
                font-size: 1rem !important;
            }
            /* Evening seal button always visible on mobile */
            #evening-seal-btn {
                display: inline-block !important;
                margin-top: 1.2rem !important;
                min-height: 44px !important;
                padding: 0.9em 2.2em !important;
                font-size: 0.52rem !important;
                letter-spacing: 0.3em !important;
                color: #383838 !important;
                border: 1px solid #222 !important;
                cursor: pointer !important;
            }

            /* Midnight card */
            #midnight-inner {
                max-width: 94vw !important;
                padding: 0 0.5rem 4rem !important;
                overflow-y: auto !important;
                max-height: 85vh !important;
            }
            #mm-flicker {
                font-size: clamp(3.5rem, 20vw, 6rem) !important;
            }
            #mm-vowel-glyph {
                font-size: clamp(2.2rem, 12vw, 4rem) !important;
                margin-bottom: 1rem !important;
            }
            #mm-demon-name {
                font-size: clamp(0.9rem, 5vw, 1.4rem) !important;
                letter-spacing: 0.1em !important;
            }
            #mm-role {
                font-size: 0.52rem !important;
                max-width: 90vw !important;
                line-height: 1.65 !important;
            }
            #mm-demon-node {
                font-size: 0.5rem !important;
                letter-spacing: 0.3em !important;
            }
            #mm-cycle-label {
                font-size: 0.5rem !important;
                letter-spacing: 0.22em !important;
            }
            #mm-color-name {
                font-size: 0.62rem !important;
            }

            /* Clock */
            #clock {
                font-size: 0.5rem !important;
                letter-spacing: 0.22em !important;
                bottom: 14px !important;
            }

            /* Performance — no scanlines on mobile */
            body::after { display: none !important; }
        }
    </style>
</head>
<body>

<div id="color-wash"></div>
<div id="mm-strobe"></div>
<div id="ritual-tension"></div>

<div id="stage">

    <div id="spider-wrap">
        <div id="waiting-counter"><div id="counter-time">—</div><div id="counter-label">until midnight</div></div>
        <svg id="spider-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" fill="none">
            <defs>
                <radialGradient id="bodyGrad" cx="50%" cy="40%" r="50%">
                    <stop offset="0%" stop-color="#2a2a2a"/>
                    <stop offset="100%" stop-color="#0d0d0d"/>
                </radialGradient>
                <radialGradient id="abdomenGrad" cx="50%" cy="35%" r="55%">
                    <stop offset="0%" stop-color="#222"/>
                    <stop offset="100%" stop-color="#090909"/>
                </radialGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="1.5" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
            </defs>

            <g stroke="#252525" stroke-width="1.2" stroke-linecap="round">
                <path d="M 62 66 L 38 50 L 14 40"/>
                <path d="M 61 72 L 34 65 L 8 55"/>
                <path d="M 62 80 L 34 82 L 8 75"/>
                <path d="M 64 87 L 38 96 L 14 108"/>
                <path d="M 98 66 L 122 50 L 146 40"/>
                <path d="M 99 72 L 126 65 L 152 55"/>
                <path d="M 98 80 L 126 82 L 152 75"/>
                <path d="M 96 87 L 122 96 L 146 108"/>
            </g>

            <g fill="#1e1e1e">
                <circle cx="38" cy="50" r="1.5"/>
                <circle cx="34" cy="65" r="1.5"/>
                <circle cx="34" cy="82" r="1.5"/>
                <circle cx="38" cy="96" r="1.5"/>
                <circle cx="122" cy="50" r="1.5"/>
                <circle cx="126" cy="65" r="1.5"/>
                <circle cx="126" cy="82" r="1.5"/>
                <circle cx="122" cy="96" r="1.5"/>
            </g>

            <ellipse cx="80" cy="72" rx="18" ry="16" fill="url(#bodyGrad)" stroke="#2a2a2a" stroke-width="0.5"/>
            <ellipse cx="80" cy="100" rx="22" ry="28" fill="url(#abdomenGrad)" stroke="#1e1e1e" stroke-width="0.5"/>
            <ellipse cx="80" cy="98" rx="8" ry="10" stroke="#1a1a1a" stroke-width="0.8" fill="none" opacity="0.5"/>
            <line x1="80" y1="88" x2="80" y2="118" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>

            <g filter="url(#glow)">
                <circle class="eye-orb" cx="72" cy="67" r="4"   fill="#0a0a0a" stroke="#333"    stroke-width="0.5"/>
                <circle class="eye-orb" cx="77" cy="65" r="4.5" fill="#0a0a0a" stroke="#383838" stroke-width="0.5"/>
                <circle class="eye-orb" cx="83" cy="65" r="4.5" fill="#0a0a0a" stroke="#383838" stroke-width="0.5"/>
                <circle class="eye-orb" cx="88" cy="67" r="4"   fill="#0a0a0a" stroke="#333"    stroke-width="0.5"/>
                <circle class="eye-orb" cx="71" cy="73" r="2.5" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="0.5"/>
                <circle class="eye-orb" cx="76" cy="74" r="2.5" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="0.5"/>

// ═══════════════════════════════════════════════════════════════
// CAVE WIND ENGINE
// Declared first. AudioContext on first click (browser policy).
// ═══════════════════════════════════════════════════════════════

let audioCtx = null;
let audioUnlocked = false;

const CAVE = {
    A: { res:80,  rumble:28, width:0.8, brightness:320, rise:0.9, dur:3.5 },
    E: { res:140, rumble:38, width:1.4, brightness:480, rise:0.6, dur:3.0 },
    I: { res:220, rumble:42, width:2.2, brightness:700, rise:0.4, dur:2.5 },
    U: { res:100, rumble:32, width:0.9, brightness:280, rise:0.8, dur:3.2 },
    O: { res:120, rumble:35, width:1.1, brightness:400, rise:0.7, dur:3.8 },
};

const windCooldowns = { A:false, E:false, I:false, U:false, O:false };

function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
document.addEventListener('click',      unlockAudio, { once: true });
document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });

function bowCello(vowel, forceDur) {
    if (!audioCtx || !audioUnlocked) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (windCooldowns[vowel]) return;

    const cave = CAVE[vowel] || CAVE.O;
    const dur  = forceDur || cave.dur;
    windCooldowns[vowel] = true;
    setTimeout(() => { windCooldowns[vowel] = false; }, dur * 800);

    const ctx = audioCtx;
    const now = ctx.currentTime;
    const { res, rumble, width, brightness, rise } = cave;

    const master = ctx.createGain();
    master.gain.setValueAtTime(0, now);
    master.gain.linearRampToValueAtTime(0.0001, now + 0.05);
    master.gain.linearRampToValueAtTime(0.38, now + rise);
    master.gain.setValueAtTime(0.36, now + rise + 0.4);
    master.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    const windLen = Math.floor(ctx.sampleRate * dur);
    const windBuf = ctx.createBuffer(1, windLen, ctx.sampleRate);
    const wd = windBuf.getChannelData(0);
    for (let i = 0; i < windLen; i++) wd[i] = Math.random() * 2 - 1;
    const wind = ctx.createBufferSource();
    wind.buffer = windBuf;

    const throat = ctx.createBiquadFilter();
    throat.type = 'bandpass';
    throat.frequency.setValueAtTime(res * 0.85, now);
    throat.frequency.linearRampToValueAtTime(res, now + rise);
    throat.Q.value = width;

    const shelf = ctx.createBiquadFilter();
    shelf.type = 'lowshelf';
    shelf.frequency.value = 200;
    shelf.gain.value = 9;

    const cap = ctx.createBiquadFilter();
    cap.type = 'lowpass';
    cap.frequency.setValueAtTime(brightness, now);
    cap.frequency.linearRampToValueAtTime(brightness * 0.7, now + dur);
    cap.Q.value = 0.8;

    const flutterLen = Math.floor(ctx.sampleRate * dur);
    const flutterBuf = ctx.createBuffer(1, flutterLen, ctx.sampleRate);
    const fd = flutterBuf.getChannelData(0);
    for (let i = 0; i < flutterLen; i++) fd[i] = Math.random() * 2 - 1;
    const flutter = ctx.createBufferSource();
    flutter.buffer = flutterBuf;
    const flutterLpf = ctx.createBiquadFilter();
    flutterLpf.type = 'lowpass';
    flutterLpf.frequency.value = 4;
    const flutterGain = ctx.createGain();
    flutterGain.gain.value = 0.35;
    const flutterMix = ctx.createGain();
    flutterMix.gain.value = 0.12;

    const chamberOsc = ctx.createOscillator();
    chamberOsc.type = 'sine';
    chamberOsc.frequency.setValueAtTime(rumble * 0.9, now);
    chamberOsc.frequency.linearRampToValueAtTime(rumble, now + rise * 0.5);
    const chamberGain = ctx.createGain();
    chamberGain.gain.setValueAtTime(0, now);
    chamberGain.gain.linearRampToValueAtTime(0.28, now + rise);
    chamberGain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    const echo = ctx.createBiquadFilter();
    echo.type = 'bandpass';
    echo.frequency.value = res * 2.3;
    echo.Q.value = width * 1.8;
    const echoGain = ctx.createGain();
    echoGain.gain.value = 0.18;

    wind.connect(throat); throat.connect(shelf); shelf.connect(cap); cap.connect(master);
    wind.connect(echo);   echo.connect(echoGain); echoGain.connect(master);
    flutter.connect(flutterLpf); flutterLpf.connect(flutterGain);
    flutterGain.connect(flutterMix); flutterMix.connect(master);
    chamberOsc.connect(chamberGain); chamberGain.connect(master);
    master.connect(ctx.destination);

    wind.start(now);       wind.stop(now + dur);
    flutter.start(now);    flutter.stop(now + dur);
    chamberOsc.start(now); chamberOsc.stop(now + dur);
}

// ── Precise 8-phase lunar system ─────────────────────────────
// Anchor: New Moon March 19 2026 at 01:23 UTC (verified)
function getLunarPhase() {
    const knownNewMoon = new Date('2026-03-19T01:23:00Z');
    const lunarPeriod  = 29.53058867 * 24 * 60 * 60 * 1000;
    const elapsed = ((Date.now() - knownNewMoon.getTime()) % lunarPeriod + lunarPeriod) % lunarPeriod;
    const lunarDay = (elapsed / lunarPeriod) * 29.53;
    const pct = elapsed / lunarPeriod;

    if      (pct < 0.0625)  return { name:'New Moon',        symbol:'🌑', day:lunarDay, index:0 };
    else if (pct < 0.25)    return { name:'Waxing Crescent', symbol:'🌒', day:lunarDay, index:1 };
    else if (pct < 0.3125)  return { name:'First Quarter',   symbol:'🌓', day:lunarDay, index:2 };
    else if (pct < 0.50)    return { name:'Waxing Gibbous',  symbol:'🌔', day:lunarDay, index:3 };
    else if (pct < 0.5625)  return { name:'Full Moon',       symbol:'🌕', day:lunarDay, index:4 };
    else if (pct < 0.75)    return { name:'Waning Gibbous',  symbol:'🌖', day:lunarDay, index:5 };
    else if (pct < 0.8125)  return { name:'Last Quarter',    symbol:'🌗', day:lunarDay, index:6 };
    else                    return { name:'Waning Crescent', symbol:'🌘', day:lunarDay, index:7 };
}

// ── Compute tonight's full assignment ────────────────────────
function computeMidnightAssignment() {
    const phase      = Math.floor(Math.random() * 12);
    const lunar      = getLunarPhase();
    // Map 8 lunar phases to 6 cycle depths for demon index
    const cycleDepth = Math.min(5, Math.floor((lunar.index / 7) * 6));
    const demonIndex = (cycleDepth * 12) + phase + 1;
    return { phase, lunar, demonIndex };
}

const eyeData   = [
    {cx:72,cy:67,r:4,  pr:1.5},{cx:77,cy:65,r:4.5,pr:1.8},
    {cx:83,cy:65,r:4.5,pr:1.8},{cx:88,cy:67,r:4,  pr:1.5},

    {cx:84,cy:74,r:2.5,pr:0.9},{cx:89,cy:73,r:2.5,pr:0.9},
];

document.addEventListener('mousemove', (e) => {
    const rect  = spiderSVG.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (160 / rect.width);
    const my = (e.clientY - rect.top)  * (160 / rect.height);
    pupils.forEach((p, i) => {
        const d = eyeData[i];
        const dx = mx - d.cx, dy = my - d.cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const factor = Math.min((d.r - d.pr - 0.3) / Math.max(dist, 0.01), 1);
        p.setAttribute('cx', d.cx + dx * factor * 0.85);
        p.setAttribute('cy', d.cy + dy * factor * 0.85);
    });
});

let idleAngle = 0;
setInterval(() => {
    idleAngle += 0.012;
    pupils.forEach((p, i) => {
        const d = eyeData[i];
        const offset = (i % 2 === 0) ? 0 : Math.PI;
        const cx = parseFloat(p.getAttribute('cx'));
        const cy = parseFloat(p.getAttribute('cy'));
        const tx = d.cx + Math.cos(idleAngle + offset) * 0.6;
        const ty = d.cy + Math.sin(idleAngle + offset * 0.7) * 0.25;
        p.setAttribute('cx', cx + (tx - cx) * 0.03);
        p.setAttribute('cy', cy + (ty - cy) * 0.03);
    });
}, 50);

];

function blowShofar(phase) {
    if (!audioCtx || !audioUnlocked) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const ctx  = audioCtx;
    const now  = ctx.currentTime;
    const root = SHOFAR_PITCH[phase] || 98.0;
    const dur  = 5.8; // full Tekiah length

    // ── MASTER ENVELOPE ──────────────────────────────────────
    // Breath finds the horn — slow rise, sustained body, breath runs out at end
    const master = ctx.createGain();
    master.gain.setValueAtTime(0, now);
    master.gain.linearRampToValueAtTime(0.0001, now + 0.08);  // tiny breath start
    master.gain.linearRampToValueAtTime(0.55, now + 0.55);    // pitch locks in
    master.gain.setValueAtTime(0.52, now + dur - 0.9);        // held
    master.gain.linearRampToValueAtTime(0.35, now + dur - 0.2); // breath running out
    master.gain.exponentialRampToValueAtTime(0.0001, now + dur);

    // ── INITIAL BREATH — air before pitch, the mouthpiece chaos ─
    const breathLen = Math.floor(ctx.sampleRate * 0.5);
    const breathBuf = ctx.createBuffer(1, breathLen, ctx.sampleRate);
    const bd = breathBuf.getChannelData(0);
    for (let i = 0; i < breathLen; i++) bd[i] = Math.random() * 2 - 1;
    const breath = ctx.createBufferSource();
    breath.buffer = breathBuf;

    const breathBpf = ctx.createBiquadFilter();
    breathBpf.type = 'bandpass';
    breathBpf.frequency.value = root * 1.5;
    breathBpf.Q.value = 0.8;

    const breathGain = ctx.createGain();
    breathGain.gain.setValueAtTime(0, now);
    breathGain.gain.linearRampToValueAtTime(0.35, now + 0.07);   // burst
    breathGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.55); // dies as pitch locks

    // ── FUNDAMENTAL — pitch wails up from below (shofar characteristic) ──
    const fund = ctx.createOscillator();
    fund.type = 'sawtooth';
    // Shofar starts flat — wails up to pitch over 400ms
    fund.frequency.setValueAtTime(root * 0.72, now + 0.05);
    fund.frequency.linearRampToValueAtTime(root * 0.88, now + 0.25);
    fund.frequency.linearRampToValueAtTime(root, now + 0.55);
    // Slight sag at the very end — breath exhausting
    fund.frequency.setValueAtTime(root, now + dur - 0.5);
    fund.frequency.linearRampToValueAtTime(root * 0.93, now + dur);

    const fundGain = ctx.createGain();
    fundGain.gain.value = 0.5;

    // ── ODD HARMONICS — what makes it sound ancient not brass ──
    // Shofar strongly favors odd partials: 3rd, 5th, 7th
    // Even harmonics are weak — the conical bore suppresses them

    const h3 = ctx.createOscillator(); // 3rd harmonic — dominant
    h3.type = 'sine';
    h3.frequency.setValueAtTime(root * 3 * 0.72, now + 0.05);
    h3.frequency.linearRampToValueAtTime(root * 3, now + 0.58);
    h3.frequency.setValueAtTime(root * 3, now + dur - 0.5);
    h3.frequency.linearRampToValueAtTime(root * 3 * 0.93, now + dur);
    const h3g = ctx.createGain();
    h3g.gain.value = 0.32;

    const h5 = ctx.createOscillator(); // 5th harmonic
    h5.type = 'sine';
    h5.frequency.setValueAtTime(root * 5 * 0.74, now + 0.08);
    h5.frequency.linearRampToValueAtTime(root * 5, now + 0.60);
    h5.frequency.setValueAtTime(root * 5, now + dur - 0.5);
    h5.frequency.linearRampToValueAtTime(root * 5 * 0.93, now + dur);
    const h5g = ctx.createGain();
    h5g.gain.value = 0.18;

    const h7 = ctx.createOscillator(); // 7th harmonic — gives the ancient edge
    h7.type = 'sine';
    h7.frequency.setValueAtTime(root * 7 * 0.76, now + 0.10);
    h7.frequency.linearRampToValueAtTime(root * 7, now + 0.62);
    h7.frequency.setValueAtTime(root * 7, now + dur - 0.5);
    h7.frequency.linearRampToValueAtTime(root * 7 * 0.93, now + dur);
    const h7g = ctx.createGain();
    h7g.gain.value = 0.09;

    const h9 = ctx.createOscillator(); // 9th — just barely there
    h9.type = 'sine';
    h9.frequency.value = root * 9;
    const h9g = ctx.createGain();
    h9g.gain.value = 0.04;

    // ── SHOFAR VIBRATO — natural breath tremor, not mechanical ──
    // Slow LFO, irregular feel approximated with slight detune oscillator
    const vib = ctx.createOscillator();
    vib.type = 'sine';
    vib.frequency.value = 4.8; // ~5Hz natural breath rate
    const vibGain = ctx.createGain();
    vibGain.gain.setValueAtTime(0, now + 0.6); // no vibrato during wail-up
    vibGain.gain.linearRampToValueAtTime(root * 0.008, now + 1.2); // settles in
    vibGain.gain.setValueAtTime(root * 0.008, now + dur - 0.8);
    vibGain.gain.linearRampToValueAtTime(0, now + dur);
    // Connect vibrato to frequency — modulates all oscillators via fund's detune
    vib.connect(vibGain);
    vibGain.connect(fund.frequency);
    vibGain.connect(h3.frequency);

    // ── CONICAL BORE RESONANCE — warm low-mid body ─────────────
    const bore = ctx.createBiquadFilter();
    bore.type = 'peaking';
    bore.frequency.value = root * 2.1;
    bore.gain.value = 5;
    bore.Q.value = 2.0;

    // ── HIGH CUT — ancient instrument, nothing shrill survives ──
    const hpCut = ctx.createBiquadFilter();
    hpCut.type = 'lowpass';
    hpCut.frequency.setValueAtTime(root * 12, now);
    hpCut.frequency.linearRampToValueAtTime(root * 9, now + dur);
    hpCut.Q.value = 0.7;

    // ── ROUTING ───────────────────────────────────────────────
    breath.connect(breathBpf); breathBpf.connect(breathGain); breathGain.connect(master);

    fund.connect(fundGain); fundGain.connect(bore);
    h3.connect(h3g);        h3g.connect(bore);
    h5.connect(h5g);        h5g.connect(bore);
    h7.connect(h7g);        h7g.connect(bore);
    h9.connect(h9g);        h9g.connect(bore);

    bore.connect(hpCut);
    hpCut.connect(master);
    master.connect(ctx.destination);

    // ── FIRE ──────────────────────────────────────────────────
    const stop = now + dur + 0.1;
    breath.start(now); breath.stop(now + 0.55);
    [fund, h3, h5, h7, h9, vib].forEach(o => { o.start(now); o.stop(stop); });
}

function triggerMidnightMass() {
    S.phase = 'midnight';
    render();

    const { phase, lunar, demonIndex } = computeMidnightAssignment();
    const demon      = GOETIA[demonIndex];
    const demonName  = demon.name;
    const demonDesc  = demon.desc;
    const vowel      = S.vowel || 'A';
    const finalColor = S.color || VOWEL_COLORS[vowel];

    applyVowelWash(finalColor, 0.20);


    // ── FLICKER: chaotic strobe, accelerates then decelerates ────
    const flickerEl = document.getElementById('mm-flicker');
    const strobeEl  = document.getElementById('mm-strobe');
    const totalFlickers = 38;

    // Red / magenta / scarlet palette — vivid, violent
    const flickerColors = [
        '#ff0033', // scarlet
        '#ff0055', // crimson-red
        '#cc0044', // deep red
        '#ff2266', // hot red-pink
        '#e6003a', // blood red
        '#ff0077', // magenta-red
        '#dd0000', // pure red
        '#ff1144', // bright scarlet
        '#c8003a', // dark scarlet
        '#ff33aa', // hot magenta
        '#ff0099', // magenta
        '#aa0033', // maroon-red
    ];

    function scheduleFlicker(index, delay) {
        if (index > totalFlickers) {
            // LANDED — switch to final white-hot then settle to vowel color
            flickerEl.textContent = phase;
            flickerEl.style.color = '#ffffff';
            flickerEl.style.textShadow = '0 0 80px #ffffff, 0 0 160px #ff0044';
            flickerEl.style.opacity = '1';

            // Shofar fires the moment the number LANDS
            blowShofar(phase);

            // Spider returns scarlet with the horn — same instant
            spiderWrap.classList.remove('vanished');
            spiderWrap.classList.add('scarlet');

            // Settle from white → vowel color over 600ms
            setTimeout(() => {
                flickerEl.style.transition = 'color 0.6s ease, text-shadow 0.6s ease';
                flickerEl.style.color = finalColor;
                flickerEl.style.textShadow = `0 0 60px ${finalColor}`;
            }, 80);

            setTimeout(() => {
                flickerEl.style.transition = 'opacity 1.2s ease';
                flickerEl.style.opacity = '0';
                revealCard(phase, demonIndex, demonName, demonDesc, lunar, vowel, finalColor);
            }, 900);
            return;
        }

        setTimeout(() => {
            const num = Math.floor(Math.random() * 12);
            const col = flickerColors[Math.floor(Math.random() * flickerColors.length)];
            const glow = flickerColors[Math.floor(Math.random() * flickerColors.length)];

            flickerEl.textContent = num;
            flickerEl.style.color = col;
            flickerEl.style.textShadow = `0 0 30px ${col}, 0 0 80px ${glow}`;
            flickerEl.style.transition = 'none';

            // Strobe flash on screen — rapid at start, fades as we decelerate
            const flashIntensity = Math.max(0, 1 - (index / totalFlickers));
            if (flashIntensity > 0.3) {
                strobeEl.style.animation = 'none';
                strobeEl.offsetHeight; // reflow
                strobeEl.style.opacity = (flashIntensity * 0.15).toFixed(3);
                strobeEl.style.animation = 'strobe-pulse 0.08s ease-out forwards';
            }

            // Slight random brightness flicker — not every frame is the same
            flickerEl.style.opacity = (0.55 + Math.random() * 0.45).toFixed(2);

            // ACCELERATION PATTERN:
            // Phase 1 (0–12): very fast, tight — chaotic burst
            // Phase 2 (13–25): slowing down — you can start reading numbers
            // Phase 3 (26–38): slow, deliberate — landing
            let nextDelay;
            if (index < 12) {
                nextDelay = delay * (1 + Math.random() * 0.3); // fast + slight chaos
            } else if (index < 26) {
                nextDelay = delay * (1.15 + Math.random() * 0.2); // decelerating
            } else {
                nextDelay = delay * (1.35 + Math.random() * 0.15); // slow landing
            }

            scheduleFlicker(index + 1, Math.min(nextDelay, 220));
        }, delay);
    }

    // Spider vanishes during flicker — brief darkness before the demon
    counterEl.classList.remove('visible');
    spiderWrap.classList.add('vanished');

    scheduleFlicker(0, 28); // start fast — 28ms per frame
}

function revealCard(phase, demonIndex, demonName, demonDesc, lunar, vowel, finalColor) {
    const card = document.getElementById('mm-card');
    card.classList.add('visible');

    document.getElementById('mm-demon-name').setAttribute('data-name', demonName);

    // Reveal sequence — staggered fades
    // vowel glyph → node line → demon name → canonical description
    // → divider → lunar phase → sig code → color name
    const seq = [
        { id:'mm-vowel-glyph', val: vowel,
          delay: 200 },
        { id:'mm-demon-node',  val: `Demon ${demonIndex} of 72`,
          delay: 1200 },
        { id:'mm-demon-name',  val: demonName,
          delay: 1800 },
        { id:'mm-role',        val: demonDesc,
          delay: 2600 },
        { id:'mm-cycle-label', val: `${lunar.symbol}  ${lunar.name}  ·  phase ${phase}`,
          delay: 4000 },
        { id:'mm-color-name',  val: S.color || 'unnamed',
          delay: 5300 },
    ];

    const dividers = document.querySelectorAll('.mm-divider');
    setTimeout(() => dividers[0] && dividers[0].classList.add('on'), 3500);
    setTimeout(() => dividers[1] && dividers[1].classList.add('on'), 5000);

    seq.forEach(({ id, val, delay }) => {
        setTimeout(() => { txt(id, val); on(id); }, delay);
    });
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
    document.querySelectorAll('.phase').forEach(p => p.classList.remove('visible'));
    const { phase, vowel } = S;
    const baseColor = VOWEL_COLORS[vowel] || '#383838';

    if (phase === 'morning') {
        document.getElementById('phase-morning').classList.add('visible');
        applyVowelWash('#383838', 0);
        document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
        const hint = document.getElementById('morning-hint');
        hint.textContent = 'select your vowel';
        hint.classList.remove('ready');
        const confirmBtn = document.getElementById('morning-confirm');
        if (confirmBtn) { confirmBtn.textContent = ''; confirmBtn.classList.remove('ready'); }

    } else if (phase === 'evening') {
        document.getElementById('phase-evening').classList.add('visible');
        document.getElementById('evening-vowel').textContent = vowel;
        applyVowelWash(baseColor, 0.12);
        document.querySelectorAll('.v-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.vowel === vowel);
        });

    } else if (phase === 'midnight') {
        document.getElementById('phase-midnight').classList.add('visible');
        // Reset card state for fresh reveal
        document.getElementById('mm-card').classList.remove('visible');
        document.getElementById('mm-flicker').textContent = '';
        document.getElementById('mm-flicker').style.opacity = '1';
        document.getElementById('mm-flicker').style.transition = '';
        ['mm-vowel-glyph','mm-demon-node','mm-demon-name','mm-role',
         'mm-cycle-label','mm-color-name'].forEach(id => {
            const el = document.getElementById(id);
            el.classList.remove('on');
            el.textContent = '';
        });
        document.querySelectorAll('.mm-divider').forEach(d => d.classList.remove('on'));
        document.querySelectorAll('.v-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.vowel === vowel);
        });
    }
}

// ═══════════════════════════════════════════════════════════════
// VOWEL BUTTONS
// ═══════════════════════════════════════════════════════════════
const noteStrip = document.getElementById('note-strip');

document.querySelectorAll('.v-btn').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
        if (S.phase === 'morning') {
            noteStrip.textContent = btn.dataset.note;
            noteStrip.style.color = '#666';
            if (!S.vowel) applyVowelWash(btn.dataset.color, 0.07);
            bowCello(btn.dataset.vowel);
        }
    });
    btn.addEventListener('mouseleave', () => {
        if (S.phase === 'morning') {
            if (S.vowel) {
                noteStrip.textContent = document.querySelector(`.v-btn[data-vowel="${S.vowel}"]`).dataset.note;
                noteStrip.style.color = '#555';
            } else {
                noteStrip.textContent = '—';
                noteStrip.style.color = '#2a2a2a';
                applyVowelWash('#383838', 0);
            }
        }
    });
    btn.addEventListener('click', () => {
        if (S.phase === 'morning') {
            unlockAudio();
            const v = btn.dataset.vowel;
            const changed = S.vowel !== v;
            S.vowel = v;
            document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyVowelWash(btn.dataset.color, 0.10);
            noteStrip.textContent = btn.dataset.note;
            noteStrip.style.color = '#555';
            if (changed) { windCooldowns[v] = false; bowCello(v); }
            const hint = document.getElementById('morning-hint');
            hint.textContent = 'press enter to seal';
            hint.classList.add('ready');
            const confirmBtn = document.getElementById('morning-confirm');
            confirmBtn.textContent = 'seal';
            confirmBtn.classList.add('ready');
        }
    });
});

// ── Mobile tap functions ─────────────────────────────────────
function confirmVowel() {
    if (S.phase === 'morning' && S.vowel) {
        unlockAudio();
        windCooldowns[S.vowel] = false;
        bowCello(S.vowel);
        S.phase = 'evening';
        render();
    }
}

function sealEvening() {
    S.color = document.getElementById('color-input').value.trim() || VOWEL_COLORS[S.vowel];
    S.sealed = true;
    triggerMidnightMass();
}

// Enter seals morning → evening (desktop)
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && S.phase === 'morning' && S.vowel) confirmVowel();
    if (e.key === 'm' || e.key === 'M') {
        unlockAudio();
        if (!S.vowel) S.vowel = 'A';
        if (!S.color) S.color = VOWEL_COLORS[S.vowel];
        triggerMidnightMass();
    }
});

// ═══════════════════════════════════════════════════════════════
// COLOR INPUT (evening phase)
// ═══════════════════════════════════════════════════════════════
const colorInput = document.getElementById('color-input');
const previewDot = document.getElementById('color-preview-dot');

colorInput.addEventListener('input', () => {
    const val  = colorInput.value.trim();
    const test = new Option().style;
    test.color = val;
    if (test.color) {
        previewDot.style.background = val;
        previewDot.style.boxShadow  = `0 0 6px ${val}`;
        applyVowelWash(val, 0.18);
    } else {
        previewDot.style.background = 'transparent';
        previewDot.style.boxShadow  = 'none';
    }
});

colorInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sealEvening();
});

// ═══════════════════════════════════════════════════════════════
// WAITING STATE ENGINE + CLOCK
// The anxious, inevitable approach to midnight.
// Christmas eve on a sinking ship.
// ═══════════════════════════════════════════════════════════════
const clockEl     = document.getElementById('clock');
const tensionEl   = document.getElementById('ritual-tension');
const counterEl   = document.getElementById('waiting-counter');
const counterTime = document.getElementById('counter-time');
const spiderWrap  = document.getElementById('spider-wrap');

let midnightFired   = false;
let wind2355Fired   = false;
let silenceFired    = false;
let waitingActive   = false;

function secsToMidnight() {
    const n = new Date();
    const s = n.getHours() * 3600 + n.getMinutes() * 60 + n.getSeconds();
    return s === 0 ? 0 : 86400 - s;
}

function fmtCountdown(s) {
    const h  = Math.floor(s / 3600);
    const m  = Math.floor((s % 3600) / 60);
    const sc = s % 60;
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(sc).padStart(2,'0');
    return String(m).padStart(2,'0') + ':' + String(sc).padStart(2,'0');
}

function enterWaiting() {
    if (waitingActive) return;
    waitingActive = true;
    spiderWrap.classList.add('vanished');
    setTimeout(() => counterEl.classList.add('visible'), 700);
}

function tick() {
    const now  = new Date();
    const h    = now.getHours();
    const m    = now.getMinutes();
    const s    = now.getSeconds();
    const secs = secsToMidnight();

    clockEl.textContent = h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

    // Glitch at actual midnight
    if (h === 0 && S.phase === 'midnight') {
        document.body.classList.add('glitch-active');
    } else {
        document.body.classList.remove('glitch-active');
    }

    // ── WAITING STATE — active after color is sealed ─────────
    if ((S.phase === 'evening' && S.sealed) || S.phase === 'waiting') {
        enterWaiting();
        counterTime.textContent = fmtCountdown(secs);

        const VH = window.innerHeight;

        if (secs > 3600) {
            // Far — line barely grows, clock grey
            const growth = ((86400 - secs) / 86400) * 50;
            tensionEl.style.height = growth + 'px';
            tensionEl.classList.remove('near','imminent');
            clockEl.classList.remove('near','imminent','midnight');
            counterTime.style.color = '#2a2a2a';
            counterTime.style.textShadow = 'none';

        } else if (secs > 300) {
            // Near — < 1hr, line accelerates, clock brightens
            const pct = 1 - (secs / 3600);
            tensionEl.style.height = (50 + pct * 150) + 'px';
            tensionEl.classList.add('near');
            tensionEl.classList.remove('imminent');
            clockEl.classList.add('near');
            clockEl.classList.remove('imminent','midnight');
            counterTime.style.color = '#3a3a3a';

        } else {
            // Imminent — < 5min, line bleeds up the screen, red terror
            const pct = 1 - (secs / 300);
            const growth = Math.min(200 + pct * (VH - 220), VH - 30);
            tensionEl.style.height = growth + 'px';
            tensionEl.classList.add('imminent');
            clockEl.classList.add('imminent');
            clockEl.classList.remove('near','midnight');
            const r = Math.floor(60 + pct * 140);
            counterTime.style.color = 'rgb(' + r + ',15,15)';
            counterTime.style.textShadow = '0 0 ' + Math.floor(pct * 18) + 'px #440000';
        }

        // 23:55:00 — cave wind plays softly, uninvited
        if (h === 23 && m === 55 && s === 0 && !wind2355Fired) {
            wind2355Fired = true;
            const v = S.vowel || 'A';
            windCooldowns[v] = false;
            bowCello(v, 2.5);
        }

        // 23:59:59 — THE HELD BREATH
        // Absolute silence for 1 second. Then midnight.
        if (h === 23 && m === 59 && s === 59 && !silenceFired) {
            silenceFired = true;
            if (audioCtx && audioCtx.state === 'running') {
                audioCtx.suspend();
                setTimeout(() => { if (audioCtx) audioCtx.resume(); }, 1100);
            }
            tensionEl.style.height = (VH - 20) + 'px';
            clockEl.classList.add('midnight');
        }
    }

    // ── ACTUAL MIDNIGHT ──────────────────────────────────────
    if (h === 0 && m === 0 && s === 0 && !midnightFired) {
        midnightFired = true;
        unlockAudio();
        if (!S.vowel) S.vowel = 'A';
        if (!S.color) S.color = VOWEL_COLORS[S.vowel];
        // Collapse the tension line
        tensionEl.style.transition = 'height 0.3s ease';
        tensionEl.style.height = '0px';
        triggerMidnightMass();
    }

    // Reset at 01:00 for next night
    if (h === 1 && m === 0 && s === 0) {
        midnightFired = false; wind2355Fired = false;
        silenceFired  = false; waitingActive = false;
        S.phase = 'morning'; S.vowel = null; S.color = null; S.sealed = false;
        spiderWrap.classList.remove('vanished','scarlet');
        counterEl.classList.remove('visible');
        tensionEl.style.height = '0px';
        clockEl.classList.remove('near','imminent','midnight');
        render();
    }
}
setInterval(tick, 1000);
tick();

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
render();

const observer = new MutationObserver(() => {
    if (document.getElementById('phase-evening').classList.contains('visible')) {
        setTimeout(() => colorInput.focus(), 400);
    }
});
observer.observe(document.getElementById('phase-evening'), {
    attributes: true, attributeFilter: ['class']
});
