<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#03050a">
    <title>Exu Aranha</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Unbounded:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --void:   #000000;
            --bg:     #03050a;
            --web:    rgba(180, 255, 120, 0.18);   /* lemon green, translucent */
            --web-glow: rgba(160, 240, 80, 0.08);
            --sigil:  rgba(180, 255, 120, 0.6);
            --star:   rgba(200, 220, 255, 0.7);
            --text:   rgba(160, 240, 80, 0.55);
            --cursor-color: rgba(180,255,120,0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            overflow: hidden;
            cursor: none;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* ── CUSTOM CROSSHAIR ───────────────────────────────── */
        #cursor {
            position: fixed;
            width: 14px;
            height: 14px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        #cursor::before, #cursor::after {
            content: '';
            position: absolute;
            background: var(--cursor-color);
        }
        #cursor::before {
            width: 1px; height: 100%;
            left: 50%; top: 0;
        }
        #cursor::after {
            width: 100%; height: 1px;
            top: 50%; left: 0;
        }

        /* ── NOISE OVERLAY ──────────────────────────────────── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 997;
            mix-blend-mode: overlay;
        }

        /* ── FULL STAGE ─────────────────────────────────────── */
        #stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── CONSTELLATION CANVAS ───────────────────────────── */
        #constellation-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* ── SPIDERWEB SVG ──────────────────────────────────── */
        #web-canvas {
            position: fixed;
            inset: 0;
            z-index: 2;
            opacity: 0;
            transition: opacity 3s ease;
        }
        #web-canvas.visible { opacity: 1; }

        /* ── VORTEX OVERLAY — black hole transition ─────────── */
        #vortex {
            position: fixed;
            inset: 0;
            z-index: 90;
            background: radial-gradient(circle at center,
                #000000 0%,
                transparent 70%
            );
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            transition: none;
        }
        #vortex.expanding {
            animation: vortex-expand 1.8s cubic-bezier(0.4, 0, 0.8, 1) forwards;
        }
        @keyframes vortex-expand {
            0%   { opacity: 0; transform: scale(0) rotate(0deg); }
            15%  { opacity: 0.7; transform: scale(0.3) rotate(20deg); }
            60%  { opacity: 1; transform: scale(1.2) rotate(80deg); }
            100% { opacity: 1; transform: scale(8) rotate(160deg); }
        }

        /* ── CENTRAL SIGIL ──────────────────────────────────── */
        #sigil-wrap {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: none;
        }

        /* Sigil image container — pulsating glow */
        #sigil-container {
            position: relative;
            width: 160px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        #sigil-container::before,
        #sigil-container::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(160, 240, 80, 0.05);
            animation: emanate 5s ease-in-out infinite;
            pointer-events: none;
        }
        #sigil-container::before {
            width: 200px; height: 320px;
            animation-delay: 0s;
        }
        #sigil-container::after {
            width: 270px; height: 400px;
            animation-delay: 2s;
        }

        @keyframes emanate {
            0%   { transform: scale(0.92); opacity: 0.5; }
            50%  { transform: scale(1.06); opacity: 0.15; }
            100% { transform: scale(1.18); opacity: 0; }
        }

        /* Sigil — white lines + red star on transparent bg.
           Tinted dark lemon-green. Pulses like dark light emanating. */
        #sigil-img {
            width: 160px;
            height: auto;
            object-fit: contain;
            filter: brightness(0.55) sepia(0.5) hue-rotate(30deg) saturate(0.6);
            opacity: 0.55;
            animation: sigil-pulse 5s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        /* Red star layer — amplifies only the crimson seal at the base */
        #sigil-img-red {
            position: absolute;
            width: 160px;
            height: auto;
            object-fit: contain;
            filter: saturate(8) brightness(0.6) contrast(3) hue-rotate(-10deg);
            opacity: 0.7;
            animation: star-pulse 5s ease-in-out infinite;
            z-index: 3;
            top: 0; left: 0;
            mix-blend-mode: screen;
        }

        @keyframes sigil-pulse {
            0%, 100% {
                opacity: 0.45;
                filter: brightness(0.45) sepia(0.4) hue-rotate(30deg) saturate(0.5);
            }
            50% {
                opacity: 0.72;
                filter: brightness(0.7) sepia(0.6) hue-rotate(45deg) saturate(0.8)
                        drop-shadow(0 0 18px rgba(160,240,80,0.2));
            }
        }

        @keyframes star-pulse {
            0%, 100% { opacity: 0.5; }
            50% {
                opacity: 0.9;
                filter: saturate(10) brightness(0.8) contrast(3) hue-rotate(-10deg)
                        drop-shadow(0 0 10px rgba(220,30,30,0.7));
            }
        }

        /* ── EXU ARANHA TEXT ────────────────────────────────── */
        /* Letters spread creatively across the web — positioned via JS */
        #web-text {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2.5s ease 1s;
        }
        #web-text.visible { opacity: 1; }

        .web-letter {
            position: absolute;
            font-family: 'Unbounded', sans-serif;
            font-weight: 300;
            font-size: 0.7rem;
            color: rgba(160, 240, 80, 0.35);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transform: translate(-50%, -50%);
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }
        .web-letter:hover {
            color: rgba(160, 240, 80, 0.9);
            text-shadow: 0 0 12px rgba(160, 240, 80, 0.5);
        }

        /* ── ENTER PROMPT ───────────────────────────────────── */
        #enter-prompt {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.52rem;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: rgba(160, 240, 80, 0.2);
            text-align: center;
            animation: prompt-breathe 3s ease-in-out infinite;
            position: relative;
            z-index: 10;
            cursor: none;
        }
        @keyframes prompt-breathe {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 1; }
        }

        /* ── MOBILE ─────────────────────────────────────────── */
        @media (max-width: 600px) {
            /* No custom cursor on touch */
            #cursor { display: none; }
            html, body { cursor: auto; }

            /* Stage full height fix */
            #stage {
                height: 100dvh;
                height: 100vh; /* fallback */
            }

            /* Sigil smaller */
            #sigil-container { width: 120px; height: 200px; }
            #sigil-img, #sigil-img-red { width: 120px; }
            #sigil-container::before { width: 150px; height: 230px; }
            #sigil-container::after  { width: 200px; height: 300px; }

            /* Enter prompt larger tap area */
            #enter-prompt {
                font-size: 0.58rem;
                letter-spacing: 0.3em;
                padding: 1.2em 2.5em;
                border: 1px solid rgba(160,240,80,0.1);
            }

            /* Web letters smaller */
            .web-letter { font-size: 0.58rem; }
        }

        @media (max-width: 380px) {
            #sigil-container { width: 100px; height: 170px; }
            #sigil-img, #sigil-img-red { width: 100px; }
        }

    </style>
</head>

<canvas id="constellation-canvas"></canvas>
<canvas id="web-canvas"></canvas>
<div id="vortex"></div>
<div id="web-text"></div>

<script>

// ═══════════════════════════════════════════════════════════════
// SPATIAL CAVE WIND — fires on entry click
// Vast, pre-symbolic. Multiple chamber throats layered.
// A passage unsealing. Not a vowel — something older.
// ═══════════════════════════════════════════════════════════════

let audioCtx = null;

function unlockAndBlow() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    blowPortalWind();
}

function blowPortalWind() {
    const ctx = audioCtx;
    const now = ctx.currentTime;
    const dur = 3.8; // outlasts the vortex animation

    // ── MASTER ───────────────────────────────────────────────
    const master = ctx.createGain();
    master.gain.setValueAtTime(0, now);
    master.gain.linearRampToValueAtTime(0.0001, now + 0.06);
    master.gain.linearRampToValueAtTime(0.42, now + 1.4);     // slow vast rise
    master.gain.setValueAtTime(0.40, now + 2.2);
    master.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    master.connect(ctx.destination);

    // ── THREE CAVE CHAMBERS — layered, slightly detuned ──────
    // Each has its own throat frequency and character
    const chambers = [
        { res: 58,  rumble: 22, width: 0.7, bright: 240, weight: 1.0  }, // vast deep vault
        { res: 95,  rumble: 31, width: 1.1, bright: 380, weight: 0.65 }, // mid chamber
        { res: 140, rumble: 44, width: 1.8, bright: 520, weight: 0.40 }, // narrow fissure
    ];

    chambers.forEach(({ res, rumble, width, bright, weight }) => {

        // Noise body
        const nLen = Math.floor(ctx.sampleRate * dur);
        const nBuf = ctx.createBuffer(1, nLen, ctx.sampleRate);
        const nd   = nBuf.getChannelData(0);
        for (let i = 0; i < nLen; i++) nd[i] = Math.random() * 2 - 1;
        const noise = ctx.createBufferSource();
        noise.buffer = nBuf;

        // Cave throat — bandpass shaping
        const throat = ctx.createBiquadFilter();
        throat.type = 'bandpass';
        throat.frequency.setValueAtTime(res * 0.8, now);
        throat.frequency.linearRampToValueAtTime(res, now + 1.4);
        throat.Q.value = width;

        // Low shelf — stone mass
        const shelf = ctx.createBiquadFilter();
        shelf.type = 'lowshelf';
        shelf.frequency.value = 180;
        shelf.gain.value = 10;

        // Brightness cap
        const cap = ctx.createBiquadFilter();
        cap.type = 'lowpass';
        cap.frequency.setValueAtTime(bright, now);
        cap.frequency.linearRampToValueAtTime(bright * 0.65, now + dur);
        cap.Q.value = 0.7;

        // Chamber gain — each layer at different weight
        const chamberGain = ctx.createGain();
        chamberGain.gain.value = weight;

        // Sub-rumble — geological floor
        const sub = ctx.createOscillator();
        sub.type = 'sine';
        sub.frequency.setValueAtTime(rumble * 0.88, now);
        sub.frequency.linearRampToValueAtTime(rumble, now + 1.2);
        const subGain = ctx.createGain();
        subGain.gain.setValueAtTime(0, now);
        subGain.gain.linearRampToValueAtTime(0.3 * weight, now + 1.4);
        subGain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

        // Ghost harmonic — standing wave in the chamber
        const ghost = ctx.createBiquadFilter();
        ghost.type = 'bandpass';
        ghost.frequency.value = res * 2.4;
        ghost.Q.value = width * 2;
        const ghostGain = ctx.createGain();
        ghostGain.gain.value = 0.15 * weight;

        // Routing
        noise.connect(throat);
        throat.connect(shelf);
        shelf.connect(cap);
        cap.connect(chamberGain);
        chamberGain.connect(master);

        noise.connect(ghost);
        ghost.connect(ghostGain);
        ghostGain.connect(master);

        sub.connect(subGain);
        subGain.connect(master);

        noise.start(now); noise.stop(now + dur);
        sub.start(now);   sub.stop(now + dur);
    });

    // ── SLOW FLUTTER — air turbulence across all chambers ────
    const flLen = Math.floor(ctx.sampleRate * dur);
    const flBuf = ctx.createBuffer(1, flLen, ctx.sampleRate);
    const fd    = flBuf.getChannelData(0);
    for (let i = 0; i < flLen; i++) fd[i] = Math.random() * 2 - 1;
    const flutter = ctx.createBufferSource();
    flutter.buffer = flBuf;
    const flLpf = ctx.createBiquadFilter();
    flLpf.type = 'lowpass';
    flLpf.frequency.value = 3; // 3Hz — slower than vowel winds, more vast
    const flGain = ctx.createGain();
    flGain.gain.value = 0.08;
    flutter.connect(flLpf);
    flLpf.connect(flGain);
    flGain.connect(master);
    flutter.start(now); flutter.stop(now + dur);
}

// ═══════════════════════════════════════════════════════════════
// CURSOR — desktop only
// ═══════════════════════════════════════════════════════════════
const cursor = document.getElementById('cursor');
const isTouchDevice = window.matchMedia('(hover: none)').matches;
if (isTouchDevice) {
    cursor.style.display = 'none';
    document.body.style.cursor = 'auto';
} else {
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
    });
}

// ═══════════════════════════════════════════════════════════════
// CONSTELLATION FIELD
// Stars of varying size and brightness, slow drift
// ═══════════════════════════════════════════════════════════════
const constCanvas = document.getElementById('constellation-canvas');
const constCtx    = constCanvas.getContext('2d');

function getViewH() {
    return window.visualViewport ? window.visualViewport.height : window.innerHeight;
}

function resizeConst() {
    constCanvas.width  = window.innerWidth;
    constCanvas.height = getViewH();
}
window.addEventListener('resize', resizeConst);
resizeConst();

// Generate stars
const STAR_COUNT = 280;
const stars = Array.from({ length: STAR_COUNT }, () => ({
    x:       Math.random() * window.innerWidth,
    y:       Math.random() * getViewH(),
    r:       Math.random() * 1.4 + 0.2,
    opacity: Math.random() * 0.6 + 0.1,
    speed:   Math.random() * 0.015 + 0.003,
    phase:   Math.random() * Math.PI * 2,
    // A handful of stars are slightly blue-tinted
    tint:    Math.random() > 0.85 ? 'rgba(180,200,255,' : 'rgba(200,210,230,'
}));

// Connect nearby stars with very faint lines (constellation lines)
const CONST_LINES = [];
for (let i = 0; i < stars.length; i++) {
    for (let j = i + 1; j < stars.length; j++) {
        const dx = stars[i].x - stars[j].x;
        const dy = stars[i].y - stars[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 90 && Math.random() > 0.65) {
            CONST_LINES.push([i, j, dist]);
        }
    }
}

let constFrame = 0;
function animateConst() {
    constCtx.clearRect(0, 0, constCanvas.width, constCanvas.height);

    constFrame += 0.004;

    // Draw constellation lines
    CONST_LINES.forEach(([i, j, dist]) => {
        const alpha = (1 - dist / 90) * 0.06;
        constCtx.beginPath();
        constCtx.moveTo(stars[i].x, stars[i].y);
        constCtx.lineTo(stars[j].x, stars[j].y);
        constCtx.strokeStyle = `rgba(180,200,255,${alpha})`;
        constCtx.lineWidth = 0.4;
        constCtx.stroke();
    });

    // Draw stars
    stars.forEach((s, idx) => {
        const pulse = Math.sin(constFrame * s.speed * 200 + s.phase);
        const op    = s.opacity * (0.7 + 0.3 * pulse);
        constCtx.beginPath();
        constCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        constCtx.fillStyle = s.tint + op.toFixed(3) + ')';
        constCtx.fill();

        // Slow drift
        s.y += s.speed * 0.08;
        if (s.y > constCanvas.height + 2) s.y = -2;
    });

    requestAnimationFrame(animateConst);
}
animateConst();

// ═══════════════════════════════════════════════════════════════
// SPIDERWEB — lemon green, radiating from center
// ═══════════════════════════════════════════════════════════════
const webCanvas = document.getElementById('web-canvas');
const webCtx    = webCanvas.getContext('2d');

function resizeWeb() {
    webCanvas.width  = window.innerWidth;
    webCanvas.height = getViewH();
}
window.addEventListener('resize', resizeWeb);
resizeWeb();

const WEB_SPOKES  = 16;    // radial lines from center
const WEB_RINGS   = 9;     // concentric rings
const WEB_COLOR   = 'rgba(160, 240, 80, ';

function drawWeb() {
    const W   = webCanvas.width;
    const H   = webCanvas.height;
    const cx  = W / 2;
    const cy  = H / 2;
    const maxR = Math.max(W, H) * 0.72;

    webCtx.clearRect(0, 0, W, H);

    // Spokes
    for (let i = 0; i < WEB_SPOKES; i++) {
        const angle = (i / WEB_SPOKES) * Math.PI * 2;
        const ex = cx + Math.cos(angle) * maxR;
        const ey = cy + Math.sin(angle) * maxR;

        const grad = webCtx.createLinearGradient(cx, cy, ex, ey);
        grad.addColorStop(0,   WEB_COLOR + '0.22)');
        grad.addColorStop(0.4, WEB_COLOR + '0.12)');
        grad.addColorStop(1,   WEB_COLOR + '0.0)');

        webCtx.beginPath();
        webCtx.moveTo(cx, cy);
        webCtx.lineTo(ex, ey);
        webCtx.strokeStyle = grad;
        webCtx.lineWidth = 0.7;
        webCtx.stroke();
    }

    // Concentric rings — slightly irregular (not perfect circles)
    for (let ring = 1; ring <= WEB_RINGS; ring++) {
        const r    = (ring / WEB_RINGS) * maxR;
        const fade = 1 - (ring / WEB_RINGS);
        const alpha = 0.18 * fade * fade;

        webCtx.beginPath();
        for (let i = 0; i <= WEB_SPOKES; i++) {
            const angle = (i / WEB_SPOKES) * Math.PI * 2;
            // Slight irregularity — web isn't machine-perfect
            const jitter = 1 + (Math.sin(i * 17 + ring * 5) * 0.04);
            const px = cx + Math.cos(angle) * r * jitter;
            const py = cy + Math.sin(angle) * r * jitter;
            if (i === 0) webCtx.moveTo(px, py);
            else webCtx.lineTo(px, py);
        }
        webCtx.closePath();
        webCtx.strokeStyle = WEB_COLOR + alpha.toFixed(3) + ')';
        webCtx.lineWidth = ring === 1 ? 1.0 : 0.5;
        webCtx.stroke();
    }

    // Central glow
    const centGrad = webCtx.createRadialGradient(cx, cy, 0, cx, cy, 80);
    centGrad.addColorStop(0,   WEB_COLOR + '0.08)');
    centGrad.addColorStop(0.5, WEB_COLOR + '0.02)');
    centGrad.addColorStop(1,   WEB_COLOR + '0.0)');
    webCtx.beginPath();
    webCtx.arc(cx, cy, 80, 0, Math.PI * 2);
    webCtx.fillStyle = centGrad;
    webCtx.fill();
}

// ═══════════════════════════════════════════════════════════════
// WEB TEXT — EXU ARANHA spread across the threads
// Letters placed at spoke/ring intersections
// ═══════════════════════════════════════════════════════════════
const webTextEl = document.getElementById('web-text');

function placeWebLetters() {
    const W   = window.innerWidth;
    const H   = getViewH();
    const cx  = W / 2;
    const cy  = H / 2;
    const maxR = Math.max(W, H) * 0.72;

    const text = 'EXU ARANHA';
    const letters = text.split('');

    // Place each character at a different spoke/ring intersection
    // Vary which ring per letter — spread them visually
    const placements = [
        { spoke: 1,  ring: 3 },  // E
        { spoke: 3,  ring: 5 },  // X
        { spoke: 5,  ring: 2 },  // U
        { spoke: 7,  ring: 6 },  // (space — skip)
        { spoke: 8,  ring: 4 },  // A
        { spoke: 10, ring: 3 },  // R
        { spoke: 12, ring: 6 },  // A
        { spoke: 13, ring: 2 },  // N
        { spoke: 14, ring: 5 },  // H
        { spoke: 15, ring: 4 },  // A
    ];

    webTextEl.innerHTML = '';

    letters.forEach((ch, idx) => {
        if (ch === ' ') return;
        const p = placements[idx];
        if (!p) return;

        const angle = (p.spoke / WEB_SPOKES) * Math.PI * 2;
        const r     = (p.ring / WEB_RINGS) * maxR * 0.88;
        const x     = cx + Math.cos(angle) * r;
        const y     = cy + Math.sin(angle) * r;

        const el = document.createElement('span');
        el.className   = 'web-letter';
        el.textContent = ch;
        el.style.left  = x + 'px';
        el.style.top   = y + 'px';
        // Slight rotation following the spoke angle
        el.style.transform = `translate(-50%, -50%) rotate(${(angle * 180 / Math.PI + 90).toFixed(1)}deg)`;

        webTextEl.appendChild(el);
    });
}

// ═══════════════════════════════════════════════════════════════
// INIT — draw web, place letters, then fade them in
// ═══════════════════════════════════════════════════════════════
drawWeb();
placeWebLetters();

setTimeout(() => {
    webCanvas.classList.add('visible');
    webTextEl.classList.add('visible');
}, 800);

window.addEventListener('resize', () => {
    resizeWeb();
    drawWeb();
    placeWebLetters();
});

// ═══════════════════════════════════════════════════════════════
// TRANSITION — click fires spiderweb forms + black hole vortex
// then redirects to the Vowel Board
// ═══════════════════════════════════════════════════════════════
let transitioning = false;

function enterBoard() {
    if (transitioning) return;
    transitioning = true;

    // Portal wind — fires immediately with the vortex
    unlockAndBlow();

    const vortex = document.getElementById('vortex');

    // 1 — Web briefly intensifies (brighter flash)
    webCtx.globalAlpha = 1;
    drawWebBright();

    // 2 — Vortex expands from center (black hole)
    setTimeout(() => {
        vortex.classList.add('expanding');
    }, 120);

    // 3 — Redirect to Vowel Board
    setTimeout(() => {
        window.location.href = 'index.html';
    }, 1900);
}

function drawWebBright() {
    // Flash the web to full brightness for transition
    const W  = webCanvas.width;
    const H  = webCanvas.height;
    const cx = W / 2;
    const cy = H / 2;
    const maxR = Math.max(W, H) * 0.72;

    // Quick bright pass over spokes
    for (let i = 0; i < WEB_SPOKES; i++) {
        const angle = (i / WEB_SPOKES) * Math.PI * 2;
        const ex = cx + Math.cos(angle) * maxR;
        const ey = cy + Math.sin(angle) * maxR;
        webCtx.beginPath();
        webCtx.moveTo(cx, cy);
        webCtx.lineTo(ex, ey);
        webCtx.strokeStyle = WEB_COLOR + '0.55)';
        webCtx.lineWidth = 1.2;
        webCtx.stroke();
    }
}

// Click, touch, or key to enter
document.addEventListener('click',      enterBoard);
document.addEventListener('touchstart', enterBoard, { passive: true });
document.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') enterBoard();
});

</script>
